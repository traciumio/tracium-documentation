<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracium Documentation</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <style>
        /* ── Dark theme ── */
        [data-theme="dark"] {
            --bg: #0f1117;
            --sidebar-bg: #161921;
            --border: #21252e;
            --text: #c9d1d9;
            --text-dim: #7d8590;
            --text-bright: #e6edf3;
            --accent: #58a6ff;
            --accent-dim: #1f6feb;
            --group-text: #f0883e;
            --hover: #1c2028;
            --active: #1c2d4a;
            --scrollbar: #30363d;
            --code-bg: #161b22;
            --card-bg: #161921;
            --pill-bg: #ffffff1a;
            --pill-border: rgba(255,255,255,0.08);
            --table-header: #161b22;
            --blockquote-bg: #161b22;
        }
        /* ── Light theme ── */
        [data-theme="light"] {
            --bg: #ffffff;
            --sidebar-bg: #f6f8fa;
            --border: #d1d9e0;
            --text: #1f2328;
            --text-dim: #656d76;
            --text-bright: #1f2328;
            --accent: #0969da;
            --accent-dim: #0550ae;
            --group-text: #bc4c00;
            --hover: #eef1f5;
            --active: #ddf4ff;
            --scrollbar: #c0c8d0;
            --code-bg: #f6f8fa;
            --card-bg: #f6f8fa;
            --pill-bg: #eef1f5;
            --pill-border: #d1d9e0;
            --table-header: #f6f8fa;
            --blockquote-bg: #f6f8fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Noto Sans, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 300px;
            min-width: 300px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s, border-color 0.2s;
        }
        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header-left h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
        }
        .sidebar-header-left p {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: background 0.15s, border-color 0.15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        .sidebar-search {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.82rem;
            outline: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .sidebar-search input:focus { border-color: var(--accent-dim); }
        .sidebar-search input::placeholder { color: var(--text-dim); }
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        .sidebar-nav::-webkit-scrollbar { width: 6px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

        .nav-group { margin-bottom: 2px; }
        .nav-group-label {
            padding: 10px 16px 4px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--group-text);
        }
        .nav-item {
            display: block;
            width: 100%;
            padding: 5px 16px 5px 28px;
            background: none;
            border: none;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.1s, color 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-item:hover { background: var(--hover); color: var(--text); }
        .nav-item.active { background: var(--active); color: var(--accent); font-weight: 600; }

        /* ── Content ── */
        .content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
        }
        .content::-webkit-scrollbar { width: 8px; }
        .content::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

        .content-inner {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 48px 80px;
        }

        .breadcrumb {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .breadcrumb span { color: var(--accent); }

        /* ── Markdown ── */
        .markdown h1 { font-size: 2rem; font-weight: 700; color: var(--text-bright); margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .markdown h2 { font-size: 1.4rem; font-weight: 600; color: var(--text-bright); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .markdown h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-bright); margin: 24px 0 8px; }
        .markdown h4 { font-size: 0.95rem; font-weight: 600; color: var(--text-bright); margin: 20px 0 8px; }
        .markdown p { margin: 0 0 16px; line-height: 1.7; }
        .markdown ul, .markdown ol { margin: 0 0 16px; padding-left: 24px; }
        .markdown li { margin: 4px 0; line-height: 1.6; }
        .markdown li input[type="checkbox"] { margin-right: 8px; }
        .markdown a { color: var(--accent); text-decoration: none; }
        .markdown a:hover { text-decoration: underline; }
        .markdown strong { color: var(--text-bright); }
        .markdown code {
            padding: 2px 6px;
            background: var(--code-bg);
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            color: var(--text-bright);
        }
        .markdown pre {
            margin: 0 0 16px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .markdown pre code {
            display: block;
            padding: 16px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.84rem;
            line-height: 1.55;
        }
        .markdown blockquote {
            margin: 0 0 16px;
            padding: 12px 16px;
            border-left: 3px solid var(--accent-dim);
            background: var(--blockquote-bg);
            border-radius: 0 6px 6px 0;
        }
        .markdown blockquote p { margin: 0; }
        .markdown table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 0.88rem; }
        .markdown th { text-align: left; padding: 10px 14px; background: var(--table-header); border: 1px solid var(--border); color: var(--text-bright); font-weight: 600; }
        .markdown td { padding: 8px 14px; border: 1px solid var(--border); }
        .markdown tr:hover td { background: var(--hover); }
        .markdown hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .markdown img { max-width: 100%; border-radius: 8px; }

        /* ── Landing ── */
        .landing { text-align: center; padding-top: 80px; }
        .landing h1 { font-size: 2.5rem; color: var(--text-bright); border: none; margin-bottom: 12px; }
        .landing .tagline { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 40px; }
        .landing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; text-align: left; margin-top: 32px; }
        .landing-card {
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .landing-card:hover { border-color: var(--accent-dim); }
        .landing-card h3 { font-size: 0.95rem; color: var(--text-bright); margin-bottom: 6px; }
        .landing-card p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }

        @media (max-width: 768px) {
            .sidebar { width: 240px; min-width: 240px; }
            .content-inner { padding: 24px 20px 60px; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-left">
                <h1>Tracium</h1>
                <p>Execution Intelligence Infrastructure</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" id="theme-btn">&#9790;</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="search" placeholder="Search docs... ( / )" oninput="filterNav(this.value)">
        </div>
        <div class="sidebar-nav" id="nav"></div>
    </nav>

    <main class="content" id="content">
        <div class="content-inner" id="content-inner"></div>
    </main>

    <script>
    const docs = [
        { group: "Overview", items: [
            { title: "Product Vision", path: "docs/00-overview/vision.md" },
            { title: "Glossary", path: "docs/00-overview/glossary.md" },
        ]},
        { group: "Architecture", items: [
            { title: "System Overview", path: "docs/01-architecture/system-overview.md" },
            { title: "Ecosystem Component Map", path: "docs/01-architecture/ecosystem-component-map.md" },
            { title: "Implementation Architecture", path: "docs/01-architecture/implementation-architecture.md" },
            { title: "Repository Strategy", path: "docs/01-architecture/repository-strategy.md" },
            { title: "Development Flow", path: "docs/01-architecture/development-flow.md" },
            { title: "Tracium Workspace", path: "docs/01-architecture/tracium-workspace.md" },
        ]},
        { group: "CSE Engine", items: [
            { title: "Overview", path: "docs/02-cse-engine/overview.md" },
            { title: "Execution Layer", path: "docs/02-cse-engine/execution-layer.md" },
            { title: "State Engine", path: "docs/02-cse-engine/state-engine.md" },
            { title: "Timeline Engine", path: "docs/02-cse-engine/timeline.md" },
            { title: "Execution Persistence", path: "docs/02-cse-engine/execution-persistence.md" },
            { title: "Streaming Model", path: "docs/02-cse-engine/streaming-model.md" },
            { title: "Production Recording", path: "docs/02-cse-engine/production-recording.md" },
            { title: "Execution Diffing", path: "docs/02-cse-engine/execution-diffing.md" },
            { title: "Distributed Execution", path: "docs/02-cse-engine/distributed-execution.md" },
            { title: "AI Consumption", path: "docs/02-cse-engine/ai-consumption.md" },
        ]},
        { group: "Visualization (Prism)", items: [
            { title: "Overview", path: "docs/03-visualization-platform/overview.md" },
            { title: "Rendering", path: "docs/03-visualization-platform/rendering.md" },
            { title: "UI Architecture", path: "docs/03-visualization-platform/ui-architecture.md" },
        ]},
        { group: "Repo Analyzer (Atlas)", items: [
            { title: "Overview", path: "docs/04-repo-analyzer/overview.md" },
            { title: "Access & Ingestion", path: "docs/04-repo-analyzer/access-and-ingestion.md" },
            { title: "Call Graph", path: "docs/04-repo-analyzer/call-graph.md" },
            { title: "Output Format (UGF)", path: "docs/04-repo-analyzer/output-format.md" },
        ]},
        { group: "SDK (Vector)", items: [
            { title: "Overview", path: "docs/05-sdk/overview.md" },
            { title: "API Surface", path: "docs/05-sdk/api.md" },
        ]},
        { group: "IDE Plugin (Pulse)", items: [
            { title: "Overview", path: "docs/06-ide-plugin/overview.md" },
        ]},
        { group: "UEF Specification", items: [
            { title: "Schema", path: "docs/07-uef-spec/schema.md" },
        ]},
        { group: "Roadmap", items: [
            { title: "Master Roadmap", path: "docs/08-roadmap/roadmap.md" },
            { title: "Phase 0: Contracts", path: "docs/08-roadmap/phase-0-contracts.md" },
            { title: "Phase 1: CSE Foundation", path: "docs/08-roadmap/phase-1-cse-foundation.md" },
            { title: "Phase 2: Visualization", path: "docs/08-roadmap/phase-2-visualization.md" },
            { title: "Phase 3: Repo Analyzer", path: "docs/08-roadmap/phase-3-repo-analyzer.md" },
            { title: "Phase 4: GitHub Access", path: "docs/08-roadmap/phase-4-github-access.md" },
            { title: "Phase 5: IDE Plugin", path: "docs/08-roadmap/phase-5-ide-plugin.md" },
            { title: "Phase 6: API & SDK", path: "docs/08-roadmap/phase-6-api-sdk.md" },
            { title: "Phase 7: Production & Streaming", path: "docs/08-roadmap/phase-7-production-streaming.md" },
            { title: "Phase 8: Multi-Language", path: "docs/08-roadmap/phase-8-multi-language.md" },
            { title: "Phase 9: Distributed & Diffing", path: "docs/08-roadmap/phase-9-distributed-diffing.md" },
            { title: "Phase 10: Intelligence", path: "docs/08-roadmap/phase-10-intelligence.md" },
        ]},
        { group: "Design Decisions", items: [
            { title: "Core Decisions (1-14)", path: "docs/09-design-decisions/decisions.md" },
        ]},
    ];

    let activePath = null;

    // ── Theme ──

    function getTheme() {
        return localStorage.getItem("tracium-theme") || "dark";
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("theme-btn").textContent = theme === "dark" ? "\u263E" : "\u2600";
        // Swap highlight.js theme
        const link = document.getElementById("hljs-theme");
        link.href = theme === "dark"
            ? "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
            : "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css";
        // Re-highlight if content is loaded
        document.querySelectorAll(".markdown pre code").forEach(block => {
            hljs.highlightElement(block);
        });
    }

    function toggleTheme() {
        const current = getTheme();
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem("tracium-theme", next);
        applyTheme(next);
    }

    // ── Nav ──

    function buildNav(filter = "") {
        const nav = document.getElementById("nav");
        const lf = filter.toLowerCase();
        let html = "";
        for (const group of docs) {
            const filtered = group.items.filter(i =>
                !filter || i.title.toLowerCase().includes(lf) || group.group.toLowerCase().includes(lf)
            );
            if (filtered.length === 0) continue;
            html += `<div class="nav-group"><div class="nav-group-label">${group.group}</div>`;
            for (const item of filtered) {
                const cls = item.path === activePath ? " active" : "";
                html += `<button class="nav-item${cls}" onclick="loadDoc('${item.path}')" title="${item.title}">${item.title}</button>`;
            }
            html += `</div>`;
        }
        nav.innerHTML = html;
    }

    function filterNav(v) { buildNav(v); }

    // ── Load doc ──

    async function loadDoc(path) {
        activePath = path;
        buildNav(document.getElementById("search").value);
        try {
            const res = await fetch(path);
            if (!res.ok) throw new Error("Failed to load " + path);
            const md = await res.text();
            const group = docs.find(g => g.items.some(i => i.path === path));
            const item = group?.items.find(i => i.path === path);
            document.getElementById("content-inner").innerHTML =
                `<div class="breadcrumb">${group?.group ?? ""} / <span>${item?.title ?? ""}</span></div>` +
                `<div class="markdown">${marked.parse(md)}</div>`;
            document.querySelectorAll(".markdown pre code").forEach(block => hljs.highlightElement(block));
            document.getElementById("content").scrollTop = 0;
            history.pushState(null, "", "#" + path);
        } catch (e) {
            document.getElementById("content-inner").innerHTML =
                `<div class="markdown"><h1>Error</h1><p>${e.message}</p></div>`;
        }
    }

    // ── Landing ──

    function showLanding() {
        const cards = docs.map(g =>
            `<div class="landing-card" onclick="loadDoc('${g.items[0].path}')">
                <h3>${g.group}</h3>
                <p>${g.items.length} document${g.items.length > 1 ? "s" : ""}</p>
            </div>`
        ).join("");
        document.getElementById("content-inner").innerHTML =
            `<div class="landing">
                <h1>Tracium</h1>
                <p class="tagline">Execution Intelligence Infrastructure</p>
                <p style="color:var(--text-dim);font-size:0.9rem;max-width:520px;margin:0 auto 24px;">
                    Tracium turns program execution into a queryable, replayable data model.
                </p>
                <div class="landing-grid">${cards}</div>
            </div>`;
    }

    // ── Keyboard ──

    document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
            e.preventDefault();
            document.getElementById("search").focus();
        }
        if (e.key === "Escape") {
            document.getElementById("search").blur();
            document.getElementById("search").value = "";
            buildNav();
        }
    });

    // ── Init ──

    applyTheme(getTheme());
    buildNav();
    const hash = location.hash.slice(1);
    if (hash && docs.some(g => g.items.some(i => i.path === hash))) {
        loadDoc(hash);
    } else {
        showLanding();
    }
    </script>
</body>
</html>
